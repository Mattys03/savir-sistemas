<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savir Sistemas - Clientes</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header" id="app-header"></header>
  <div class="container">
    <div class="card">
      <div class="card-header">
        <h2>Lista de Clientes</h2>
        <button class="btn btn-success" onclick="openModal()">Novo Cliente</button>
      </div>
      <div id="table-container"><p class="loading">Carregando...</p></div>
      <div class="info-banner admin" id="perm-admin" style="display:none">👑 Você é administrador e pode gerenciar todos os clientes.</div>
      <div class="info-banner user" id="perm-user" style="display:none">🔒 Você só pode editar/excluir os clientes que você criou.</div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="modal">
    <div class="modal">
      <h3 id="modal-title">Novo Cliente</h3>
      <form id="client-form">
        <input type="hidden" id="edit-id">
        <div class="form-group"><label>Nome</label><input type="text" id="f-name" required></div>
        <div class="form-group"><label>E-mail</label><input type="email" id="f-email" required></div>
        <div class="form-group"><label>Telefone</label><input type="text" id="f-phone" required></div>
        <div class="form-group"><label>Endereço</label><input type="text" id="f-address" required></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn btn-success">Gravar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    requireAuth(); renderHeader();
    if (isAdmin()) document.getElementById('perm-admin').style.display = 'block';
    else document.getElementById('perm-user').style.display = 'block';

    let editingId = null;

    async function loadTable() {
      try {
        const list = await getClients();
        const tc = document.getElementById('table-container');
        if (list.length === 0) { tc.innerHTML = '<p class="loading">Nenhum cliente cadastrado.</p>'; return; }
        tc.innerHTML = '<table><thead><tr><th>ID</th><th>Nome</th><th>Email</th><th>Telefone</th><th>Endereço</th><th>Ações</th></tr></thead><tbody>' +
          list.map(c => '<tr><td>' + (c.id||'').slice(0,8) + '</td><td><strong>' + c.name + '</strong></td><td>' + c.email + '</td><td>' + c.phone + '</td><td>' + c.address + '</td><td>' +
            '<button class="action-btn action-edit" onclick="edit(\'' + c.id + '\')">Editar</button>' +
            '<button class="action-btn action-delete" onclick="del(\'' + c.id + '\')">Excluir</button>' +
          '</td></tr>').join('') + '</tbody></table>';
      } catch (e) { document.getElementById('table-container').innerHTML = '<div class="alert alert-error">' + e.message + '</div>'; }
    }

    function openModal() { editingId = null; document.getElementById('modal-title').textContent = 'Novo Cliente'; document.getElementById('client-form').reset(); document.getElementById('modal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    async function edit(id) {
      editingId = id;
      const c = await getClientById(id);
      document.getElementById('modal-title').textContent = 'Editar Cliente';
      document.getElementById('f-name').value = c.name;
      document.getElementById('f-email').value = c.email;
      document.getElementById('f-phone').value = c.phone;
      document.getElementById('f-address').value = c.address;
      document.getElementById('modal').classList.remove('hidden');
    }

    async function del(id) {
      if (!confirm('Tem certeza que deseja excluir este cliente?')) return;
      try { await deleteClient(id); alert('✅ Cliente excluído!'); loadTable(); }
      catch (e) { alert('❌ ' + e.message); }
    }

    document.getElementById('client-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = { name: document.getElementById('f-name').value, email: document.getElementById('f-email').value, phone: document.getElementById('f-phone').value, address: document.getElementById('f-address').value };
      try {
        if (editingId) { await updateClient(editingId, data); alert('✅ Cliente atualizado!'); }
        else { await createClient(data); alert('✅ Cliente cadastrado!'); }
        closeModal(); loadTable();
      } catch (e) { alert('❌ ' + e.message); }
    });

    loadTable();
  </script>
</body>
</html>
