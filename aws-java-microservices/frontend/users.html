<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savir Sistemas - Usuários</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header" id="app-header"></header>
  <div class="container">
    <div class="card">
      <div class="card-header">
        <h2>Lista de Usuários</h2>
        <button class="btn btn-success" id="btn-new" onclick="openModal()" style="display:none">Novo Usuário</button>
      </div>
      <div id="table-container"><p class="loading">Carregando...</p></div>
      <div class="info-banner admin" id="perm-admin" style="display:none">👑 Você tem permissão total para gerenciar todos os usuários.</div>
      <div class="info-banner user" id="perm-user" style="display:none">🔒 Você só pode editar seu próprio perfil.</div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="modal">
    <div class="modal">
      <h3 id="modal-title">Novo Usuário</h3>
      <form id="user-form">
        <div class="form-group"><label>Nome Completo</label><input type="text" id="f-name" required></div>
        <div class="form-group"><label>E-mail</label><input type="email" id="f-email" required></div>
        <div class="form-group"><label>Login</label><input type="text" id="f-login" required></div>
        <div class="form-group" id="pw-group"><label>Senha</label><input type="password" id="f-password"></div>
        <div class="form-group">
          <label>Perfil de Acesso</label>
          <select id="f-profile" required>
            <option value="">Selecione...</option>
            <option value="Administrador">Administrador</option>
            <option value="Usuário">Usuário</option>
          </select>
          <p id="profile-locked" style="display:none; margin-top:6px; font-size:0.8rem; color:#666">🔒 Apenas administradores podem alterar perfis de acesso.</p>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn btn-success">Gravar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    requireAuth(); renderHeader();
    if (isAdmin()) { document.getElementById('perm-admin').style.display = 'block'; document.getElementById('btn-new').style.display = 'inline-block'; }
    else document.getElementById('perm-user').style.display = 'block';

    let editingId = null;

    async function loadTable() {
      try {
        const list = await getUsers();
        const tc = document.getElementById('table-container');
        if (list.length === 0) { tc.innerHTML = '<p class="loading">Nenhum usuário.</p>'; return; }
        const badges = { 'Administrador': 'background:#ffedd5;color:#ea580c;border:1px solid #fed7aa', 'Usuário': 'background:#f1f5f9;color:#475569;border:1px solid #e2e8f0' };
        tc.innerHTML = '<table><thead><tr><th>ID</th><th>Nome</th><th>Email</th><th>Login</th><th>Perfil</th><th>Ações</th></tr></thead><tbody>' +
          list.map(u => {
            const isSelf = u.id === currentUser.id;
            const canEdit = isAdmin() || isSelf;
            const canDel = isAdmin() && !isSelf;
            return '<tr><td>' + (u.id||'').slice(0,8) + '</td><td><strong>' + u.name + '</strong></td><td>' + u.email + '</td><td>' + u.login + '</td><td><span style="padding:3px 10px;border-radius:12px;font-size:0.75rem;font-weight:600;' + (badges[u.profile]||'') + '">' + u.profile + '</span></td><td>' +
              (canEdit ? '<button class="action-btn action-edit" onclick="edit(\'' + u.id + '\')">Editar</button>' : '') +
              (canDel ? '<button class="action-btn action-delete" onclick="del(\'' + u.id + '\')">Excluir</button>' : '') +
              (!canEdit && !canDel ? '<span style="color:#999;font-size:0.8rem">Sem permissão</span>' : '') +
            '</td></tr>';
          }).join('') + '</tbody></table>';
      } catch (e) { document.getElementById('table-container').innerHTML = '<div class="alert alert-error">' + e.message + '</div>'; }
    }

    function openModal() {
      editingId = null;
      document.getElementById('modal-title').textContent = 'Novo Usuário';
      document.getElementById('user-form').reset();
      document.getElementById('pw-group').style.display = 'block';
      document.getElementById('f-login').readOnly = false;
      document.getElementById('f-profile').disabled = false;
      document.getElementById('profile-locked').style.display = 'none';
      document.getElementById('modal').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    async function edit(id) {
      editingId = id;
      const u = await getUserById(id);
      document.getElementById('modal-title').textContent = 'Editar Usuário';
      document.getElementById('f-name').value = u.name;
      document.getElementById('f-email').value = u.email;
      document.getElementById('f-login').value = u.login;
      document.getElementById('f-login').readOnly = true;
      document.getElementById('f-profile').value = u.profile;
      document.getElementById('pw-group').style.display = 'none';
      // Bloquear perfil se não for admin
      if (!isAdmin()) {
        document.getElementById('f-profile').disabled = true;
        document.getElementById('profile-locked').style.display = 'block';
      } else {
        document.getElementById('f-profile').disabled = false;
        document.getElementById('profile-locked').style.display = 'none';
      }
      document.getElementById('modal').classList.remove('hidden');
    }

    async function del(id) {
      if (!confirm('Tem certeza que deseja excluir este usuário?')) return;
      try { await deleteUser(id); alert('✅ Usuário excluído!'); loadTable(); }
      catch (e) { alert('❌ ' + e.message); }
    }

    document.getElementById('user-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = { name: document.getElementById('f-name').value, email: document.getElementById('f-email').value, login: document.getElementById('f-login').value, profile: document.getElementById('f-profile').disabled ? undefined : document.getElementById('f-profile').value };
      try {
        if (editingId) {
          if (!data.profile) delete data.profile;
          await updateUser(editingId, data);
          alert('✅ Usuário atualizado!');
          if (editingId === currentUser.id) { currentUser.name = data.name; currentUser.email = data.email; localStorage.setItem('currentUser', JSON.stringify(currentUser)); }
        } else {
          data.password = document.getElementById('f-password').value || '123';
          await createUser(data);
          alert('✅ Usuário cadastrado!');
        }
        closeModal(); loadTable();
      } catch (e) { alert('❌ ' + e.message); }
    });

    loadTable();
  </script>
</body>
</html>
