<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savir Cloud - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <h2>Savir Cloud</h2>
      <p>Gestão Empresarial AWS</p>
      <div id="error-msg" class="alert alert-error hidden"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="login">Usuário</label>
          <input type="text" id="login" placeholder="Digite seu login" required>
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="Digite sua senha" required>
        </div>
        <button type="submit" class="btn btn-primary" id="btn-login">Entrar</button>
      </form>
      <p style="text-align:center; margin-top:20px; color:#888; font-size:0.8rem;">
        Arquitetura: Java Spring Boot + Microserviços + MVC + GRASP
      </p>
    </div>
  </div>
  <script src="js/app.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = 'dashboard.html';
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const err = document.getElementById('error-msg');
      btn.textContent = 'Entrando...'; btn.disabled = true;
      err.classList.add('hidden');
      try {
        await login(document.getElementById('login').value, document.getElementById('password').value);
      } catch (ex) {
        err.textContent = ex.message; err.classList.remove('hidden');
        btn.textContent = 'Entrar'; btn.disabled = false;
      }
    });
  </script>
</body>
</html>
