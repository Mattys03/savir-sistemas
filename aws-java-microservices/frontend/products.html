<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savir Sistemas - Produtos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header" id="app-header"></header>
  <div class="container">
    <div class="card">
      <div class="card-header">
        <h2>Lista de Produtos</h2>
        <button class="btn btn-success" onclick="openModal()">Novo Produto</button>
      </div>
      <div id="table-container"><p class="loading">Carregando...</p></div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="modal">
    <div class="modal">
      <h3 id="modal-title">Novo Produto</h3>
      <form id="product-form">
        <div class="form-group"><label>Nome</label><input type="text" id="f-name" required></div>
        <div class="form-group"><label>Descrição</label><input type="text" id="f-desc" required></div>
        <div class="form-group"><label>Preço (R$)</label><input type="number" step="0.01" id="f-price" required></div>
        <div class="form-group"><label>Estoque</label><input type="number" id="f-stock" required></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn btn-success">Gravar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    requireAuth(); renderHeader();
    let editingId = null;

    async function loadTable() {
      try {
        const list = await getProducts();
        const tc = document.getElementById('table-container');
        if (list.length === 0) { tc.innerHTML = '<p class="loading">Nenhum produto cadastrado.</p>'; return; }
        tc.innerHTML = '<table><thead><tr><th>ID</th><th>Nome</th><th>Descrição</th><th>Preço</th><th>Estoque</th><th>Ações</th></tr></thead><tbody>' +
          list.map(p => '<tr><td>' + (p.id||'').slice(0,8) + '</td><td><strong>' + p.name + '</strong></td><td>' + p.description + '</td><td>R$ ' + Number(p.price).toFixed(2) + '</td><td>' + p.stock + '</td><td>' +
            '<button class="action-btn action-edit" onclick="edit(\'' + p.id + '\')">Editar</button>' +
            '<button class="action-btn action-delete" onclick="del(\'' + p.id + '\')">Excluir</button>' +
          '</td></tr>').join('') + '</tbody></table>';
      } catch (e) { document.getElementById('table-container').innerHTML = '<div class="alert alert-error">' + e.message + '</div>'; }
    }

    function openModal() { editingId = null; document.getElementById('modal-title').textContent = 'Novo Produto'; document.getElementById('product-form').reset(); document.getElementById('modal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    async function edit(id) {
      editingId = id;
      const p = await getProductById(id);
      document.getElementById('modal-title').textContent = 'Editar Produto';
      document.getElementById('f-name').value = p.name;
      document.getElementById('f-desc').value = p.description;
      document.getElementById('f-price').value = p.price;
      document.getElementById('f-stock').value = p.stock;
      document.getElementById('modal').classList.remove('hidden');
    }

    async function del(id) {
      if (!confirm('Tem certeza que deseja excluir este produto?')) return;
      try { await deleteProduct(id); alert('✅ Produto excluído!'); loadTable(); }
      catch (e) { alert('❌ ' + e.message); }
    }

    document.getElementById('product-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = { name: document.getElementById('f-name').value, description: document.getElementById('f-desc').value, price: parseFloat(document.getElementById('f-price').value), stock: parseInt(document.getElementById('f-stock').value) };
      try {
        if (editingId) { await updateProduct(editingId, data); alert('✅ Produto atualizado!'); }
        else { await createProduct(data); alert('✅ Produto cadastrado!'); }
        closeModal(); loadTable();
      } catch (e) { alert('❌ ' + e.message); }
    });

    loadTable();
  </script>
</body>
</html>
